{% extends "base.html" %}

{% block title %}<title>루미나 | 글쓰기</title>{% endblock %}

{% block content %}
<main class="max-w-[1120px] mx-auto px-6 py-12">
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
    <!-- Editor Canvas -->
    <div class="lg:col-span-8">
      <form method="POST" action="/write" class="space-y-8">
        <!-- Title Input -->
        <div class="group">
          <input
            type="text"
            name="title"
            required
            class="w-full bg-transparent border-none p-0 font-h1 text-h1 text-on-surface placeholder:text-surface-variant focus:ring-0 editor-focus"
            placeholder="제목을 입력하세요..."
          />
          <div class="h-[1px] w-0 group-focus-within:w-full bg-primary-container transition-all duration-500 mt-2"></div>
        </div>

        <!-- Metadata Bar -->
        <div class="flex items-center gap-4 py-4 border-y border-outline-variant/30">
          <span class="text-outline text-label-sm font-label-sm">새 글 작성</span>
        </div>

        <!-- Content Area -->
        <div class="min-h-[500px]">
          <textarea
            name="content"
            required
            class="w-full bg-transparent border-none p-0 font-body-lg text-body-lg text-on-surface-variant placeholder:text-surface-variant focus:ring-0 resize-none editor-focus leading-relaxed"
            style="height: 600px"
            placeholder="이야기를 들려주세요..."
          ></textarea>
        </div>

        <!-- Mobile Submit (hidden on desktop, shown in sidebar on lg) -->
        <div class="lg:hidden space-y-3 pt-6">
          <button type="submit" class="w-full bg-primary-container text-white py-4 rounded-full font-h3 text-[18px] hover:opacity-95 transition-all shadow-lg active:scale-[0.98]">
            게시하기
          </button>
          <a href="/" class="block w-full text-center bg-transparent text-primary py-3 rounded-full font-label-sm text-label-sm border border-primary/20 hover:bg-surface-variant/30 transition-all">
            취소
          </a>
        </div>
      </form>
    </div>

    <!-- Sidebar Controls -->
    <div class="lg:col-span-4 space-y-6">
      <div class="bg-[#F5F5DC] p-8 rounded-xl border border-[#E5E4D2] shadow-[0_4px_20px_-10px_rgba(74,74,64,0.08)] sticky top-28">
        <h3 class="font-h3 text-h3 text-on-surface mb-6">게시 설정</h3>
        <div class="space-y-6">
          <div class="space-y-2">
            <label class="font-label-sm text-label-sm text-outline uppercase tracking-wider">공개 범위</label>
            <div class="flex items-center justify-between p-3 bg-surface-container-lowest rounded-lg border border-outline-variant">
              <span class="font-body-md text-on-surface">공개</span>
              <span class="material-symbols-outlined text-primary">expand_more</span>
            </div>
          </div>
          <div class="pt-6 space-y-3">
            <button type="submit" formmethod="POST" class="w-full bg-primary-container text-white py-4 rounded-full font-h3 text-[18px] hover:opacity-95 transition-all shadow-lg active:scale-[0.98]" onclick="document.forms[0].requestSubmit()">
              게시하기
            </button>
            <a href="/" class="block w-full text-center bg-transparent text-primary py-3 rounded-full font-label-sm text-label-sm border border-primary/20 hover:bg-surface-variant/30 transition-all">
              취소
            </a>
          </div>
        </div>
      </div>

      <!-- Writing Tip -->
      <div class="p-6 border border-outline-variant rounded-xl border-dashed">
        <div class="flex items-start gap-4">
          <span class="material-symbols-outlined text-secondary">lightbulb</span>
          <div>
            <h4 class="font-h3 text-[16px] text-on-surface mb-1">글쓰기 팁</h4>
            <p class="text-on-surface-variant font-body-md text-sm leading-relaxed">
              짧은 문단과 여백을 활용해 보세요. 명확한 글이 좋은 글입니다.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
{% endblock %}
