services:
  - type: web
    name: day4-flask
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DB_PATH
        value: /var/data/board.db
    disks:
      - name: sqlite-data
        mountPath: /var/data
        sizeGB: 1
